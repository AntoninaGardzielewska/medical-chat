services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medical-chat-backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DATABASE_URL=${DATABASE_URL:-}
      - CHROMA_DB_PATH=${CHROMA_DB_PATH:-/data/chroma_db}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000"]}
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy  # Changed from service_started
    volumes:
      - chroma_data:/data/chroma_db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s  # ADDED: Give 60s for uvicorn to start
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medical-chat-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - HOSTNAME=0.0.0.0
      - PORT=3000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s  # ADDED: Give 30s for Next.js to start
    restart: unless-stopped
    shm_size: 2gb
    mem_limit: 3gb

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:11434/", "-o", "/dev/null"]
      interval: 5s
      timeout: 10s
      retries: 60
      start_period: 180s  # INCREASED: Ollama takes time to initialize

volumes:
  chroma_data:
  ollama: